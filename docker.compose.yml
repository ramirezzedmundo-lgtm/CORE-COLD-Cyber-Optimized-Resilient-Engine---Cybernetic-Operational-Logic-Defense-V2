version: '3.8'

services:
  # El núcleo de tu sistema (Fase 1, 2 y 3)
  core-cold-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: core_cold_engine
    restart: always
    environment:
      - DATABASE_URL=postgres://tella_admin:password123@db_postgres:5432/core_cold_db
      - REDIS_URL=redis://cache_redis:6379
      - JWT_SECRET=${JWT_SECRET} # Cargado desde tu .env
    ports:
      - "3000:3000"   # API Logic (Node.js)
      - "50051:50051" # Bridge (Go/gRPC)
    depends_on:
      - db_postgres
      - cache_redis
    networks:
      - cold_network

  # Fase 1 & 2: Almacenamiento de auditoría (PostgreSQL)
  db_postgres:
    image: postgres:15-alpine
    container_name: core_cold_db
    environment:
      - POSTGRES_USER=tella_admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=core_cold_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql # Tu esquema inicial
    networks:
      - cold_network

  # Fase 2: Caché para Tokens Rotativos (Redis)
  cache_redis:
    image: redis:7-alpine
    container_name: core_cold_redis
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - cold_network

networks:
  cold_network:
    driver: bridge

volumes:
  postgres_data:
