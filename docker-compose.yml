version: '3.8'

services:
  # L3: THE BRIDGE (Go) - Orquestación de Tokens
  bridge:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: core-cold-bridge
    networks:
      - cold-net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25' # Control de CPU Frío
          memory: 64M

  # L2: THE AUDITOR (Rust) - Integridad Contable
  auditor:
    build:
      context: .
      dockerfile: Dockerfile.rust
    container_name: core-cold-auditor
    depends_on:
      - bridge
    networks:
      - cold-net
    restart: always

  # L4: THE LOGIC (Node.js) - Gateway de Comando
  logic:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: core-cold-logic
    ports:
      - "18181:18181" # Puerto de control industrial
    depends_on:
      - auditor
    networks:
      - cold-net
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET} # Variable desde archivo .env

networks:
  cold-net:
    driver: bridge
    name: core-cold-v2-isolated
